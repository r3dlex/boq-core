name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  _rust-quality-self-hosted:
    name: Rust quality gates (self-hosted probe)
    # Self-hosted runners cannot be used as an automatic fallback when the
    # runner pool is absent: a queued self-hosted job blocks the whole workflow.
    # Keep the probe opt-in so the GitHub-hosted gate remains the deterministic CI.
    if: github.event_name == 'push' && vars.ENABLE_SELF_HOSTED_RUST_PROBE == 'true'
    runs-on: [self-hosted, ubuntu-latest]
    steps:
      - uses: actions/setup-node@v4
        id: setup_node
        continue-on-error: true
        with:
          node-version: "22"
      - name: Self-hosted quality gate
        id: self_hosted_gate
        continue-on-error: true
        run: |
          set -euo pipefail
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              sleep $((attempt * 10))
            done
            "$@"
          }
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
          retry rustup toolchain install stable --component rustfmt --component clippy --component llvm-tools-preview
          retry cargo install cargo-llvm-cov --locked
          retry cargo install prek --locked
          retry npm install -g archgate
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          cargo llvm-cov --all-features --summary-only \
            --ignore-filename-regex 'src/bin/xtask.rs' \
            --fail-under-lines 95 \
            --fail-under-functions 95 \
            --fail-under-regions 95
          cargo run --bin xtask -- fixtures verify
          archgate check --ci
          prek run --all-files
      - name: Report self-hosted probe failure
        if: steps.setup_node.outcome != 'success' || steps.self_hosted_gate.outcome != 'success'
        run: echo "::warning::Self-hosted Rust quality probe setup or execution failed."

  rust-quality:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install quality tools
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              sleep $((attempt * 10))
            done
            "$@"
          }
          retry cargo install cargo-llvm-cov --locked
          retry cargo install prek --locked
          retry npm install -g archgate
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features
      - name: Coverage threshold
        run: |
          cargo llvm-cov --all-features --summary-only \
            --ignore-filename-regex 'src/bin/xtask.rs' \
            --fail-under-lines 95 \
            --fail-under-functions 95 \
            --fail-under-regions 95
      - name: Fixture manifest
        run: cargo run --bin xtask -- fixtures verify
      - name: Archgate
        run: archgate check --ci
      - name: Prek hooks
        run: prek run --all-files
