name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  _rust-quality-self-hosted:
    name: Rust quality gates (self-hosted probe)
    runs-on: [self-hosted, ubuntu-latest]
    outputs:
      passed: ${{ steps.mark.outputs.passed }}
    steps:
      - name: Self-hosted quality gate
        id: self_hosted_gate
        continue-on-error: true
        run: |
          set -euo pipefail
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              sleep $((attempt * 10))
            done
            "$@"
          }
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
          retry rustup toolchain install stable --component rustfmt --component clippy --component llvm-tools-preview
          retry cargo install cargo-llvm-cov --locked
          retry cargo install prek --locked
          retry npm install -g archgate
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          cargo llvm-cov --all-features --summary-only \
            --ignore-filename-regex 'src/bin/xtask.rs' \
            --fail-under-lines 95 \
            --fail-under-functions 95 \
            --fail-under-regions 95
          cargo run --bin xtask -- fixtures verify
          archgate check --ci
          prek run --all-files
      - id: mark
        if: steps.self_hosted_gate.outcome == 'success'
        run: echo "passed=true" >> "$GITHUB_OUTPUT"
      - name: Report self-hosted fallback
        if: steps.self_hosted_gate.outcome != 'success'
        run: echo "::warning::Self-hosted Rust quality probe failed; GitHub-hosted fallback will run as the gating job."

  rust-quality:
    name: Rust quality gates
    needs: _rust-quality-self-hosted
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Route
        run: echo "self-hosted passed=${{ needs._rust-quality-self-hosted.outputs.passed }}"
      - uses: actions/checkout@v4
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - name: Install quality tools
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              sleep $((attempt * 10))
            done
            "$@"
          }
          retry cargo install cargo-llvm-cov --locked
          retry cargo install prek --locked
          retry npm install -g archgate
      - name: Format
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: cargo fmt --check
      - name: Clippy
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: cargo test --all-features
      - name: Coverage threshold
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: |
          cargo llvm-cov --all-features --summary-only \
            --ignore-filename-regex 'src/bin/xtask.rs' \
            --fail-under-lines 95 \
            --fail-under-functions 95 \
            --fail-under-regions 95
      - name: Fixture manifest
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: cargo run --bin xtask -- fixtures verify
      - name: Archgate
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: archgate check --ci
      - name: Prek hooks
        if: needs._rust-quality-self-hosted.outputs.passed != 'true'
        run: prek run --all-files
