name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  rust-quality:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - name: Install quality tools
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              sleep $((attempt * 10))
            done
            "$@"
          }
          retry cargo install cargo-llvm-cov --locked
          retry cargo install prek --locked
          retry npm install -g archgate
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features
      - name: Coverage threshold
        run: |
          cargo llvm-cov --all-features --summary-only \
            --ignore-filename-regex 'src/bin/xtask.rs' \
            --fail-under-lines 95 \
            --fail-under-functions 95 \
            --fail-under-regions 95
      - name: Fixture manifest
        run: cargo run --bin xtask -- fixtures verify
      - name: Archgate
        run: archgate check --ci
      - name: Prek hooks
        run: prek run --all-files
